<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Tareas - Dario Idiart</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 500px;
            padding: 30px;
        }
        
        h1 {
            color: #1a1a2e;
            text-align: center;
            margin-bottom: 20px;
            font-size: 28px;
            border-bottom: 3px solid #e94560;
            padding-bottom: 10px;
        }
        
        .input-section {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .input-section input {
            flex: 1;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        
        .input-section button {
            padding: 10px 20px;
            background-color: #1a1a2e;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        
        .input-section button:hover {
            background-color: #e94560;
        }
        
        .task-list {
            list-style: none;
            margin-bottom: 20px;
        }
        
        .task-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background-color: #f9f9f9;
            margin-bottom: 5px;
            border-radius: 5px;
        }
        
        .task-item.completed {
            text-decoration: line-through;
            opacity: 0.7;
        }
        
        .task-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
        }
        
        .task-item span {
            flex: 1;
        }
        
        .delete-btn {
            background-color: #ff4444;
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .delete-btn:hover {
            background-color: #cc0000;
        }
        
        .stats {
            display: flex;
            justify-content: space-between;
            color: #666;
            font-size: 14px;
            margin-top: 20px;
        }
        
        .nav-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .btn {
            flex: 1;
            padding: 12px;
            text-align: center;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .btn-github {
            background-color: #24292e;
            color: white;
        }
        
        .btn-github:hover {
            background-color: #e94560;
        }
        
        .btn-portfolio {
            background-color: #1a1a2e;
            color: white;
        }
        
        .btn-portfolio:hover {
            background-color: #e94560;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Lista de Tareas</h1>
        
        <div class="input-section">
            <input type="text" id="taskInput" placeholder="Escribe una nueva tarea...">
            <button onclick="addTask()">Agregar</button>
        </div>
        
        <ul class="task-list" id="taskList">            <!-- Las tareas se renderizan aquí -->
        </ul>
        
        <div class="stats" id="stats">
            <!-- Estadísticas se muestran aquí -->
        </div>
        
        <div class="nav-buttons">
            <a href="https://github.com/dario222/todo-app" target="_blank" class="btn btn-github">📂 Ver en GitHub</a>
            <a href="https://dario222.github.io/mi-portfolio/" class="btn btn-portfolio">🏠 Volver al Portfolio</a>
        </div>
    </div>

    <script>
        // Cargar tareas del localStorage
        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
        
        function renderTasks() {
            const taskList = document.getElementById('taskList');
            const stats = document.getElementById('stats');
            
            if (tasks.length === 0) {
                taskList.innerHTML = '<p style="text-align: center; color: #666; padding: 20px;">No hay tareas. ¡Agrega una!</p>';
                stats.innerHTML = '0/0 tareas completadas';
                return;
            }
            
            let html = '';
            let completedCount = 0;
            
            tasks.forEach((task, index) => {
                if (task.completed) completedCount++;
                html += `
                    <li class="task-item ${task.completed ? 'completed' : ''}">
                        <input type="checkbox" ${task.completed ? 'checked' : ''} 
                               onchange="toggleTask(${index})">
                        <span>${task.text}</span>
                        <button class="delete-btn" onclick="deleteTask(${index})">×</button>
                    </li>
                `;
            });
            
            taskList.innerHTML = html;
            stats.innerHTML = `${completedCount}/${tasks.length} tareas completadas`;
        }
        
        function addTask() {
            const input = document.getElementById('taskInput');
            const text = input.value.trim();
            
            if (text) {
                tasks.push({ text, completed: false });
                localStorage.setItem('tasks', JSON.stringify(tasks));
                input.value = '';
                renderTasks();
            }
        }
        
        function toggleTask(index) {
            tasks[index].completed = !tasks[index].completed;
            localStorage.setItem('tasks', JSON.stringify(tasks));
            renderTasks();
        }
        
        function deleteTask(index) {
            tasks.splice(index, 1);
            localStorage.setItem('tasks', JSON.stringify(tasks));
            renderTasks();
        }
        
        // Render inicial
        renderTasks();
        
        // Permitir agregar con Enter
        document.getElementById('taskInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addTask();
            }
        });
    </script>
</body>
</html>
